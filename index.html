<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Image Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Nexus AI Image Generator</h1>
        </header>
        <main>
            <section class="chat-interface">
                <textarea id="chat-input" placeholder="Type your message..."></textarea>
                <button id="send-button">Send</button>
                <div id="chat-output"></div>
            </section>
            <section class="image-generator">
                <h2>Generate an Image</h2>
                <input type="text" id="image-prompt" placeholder="Enter image prompt...">
                <button id="generate-button">Generate</button>
                <div id="image-output"></div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Nexus AI Image Generator. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
